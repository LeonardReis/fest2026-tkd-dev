<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="95" fill="#1A365D" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Inner Circle (Taegeuk background) -->
  <circle cx="100" cy="100" r="65" fill="#fff" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Taegeuk Red (Top) -->
  <path d="M 35 100 A 65 65 0 0 1 165 100 A 32.5 32.5 0 0 0 100 100 A 32.5 32.5 0 0 1 35 100 Z" fill="#E53E3E"/>
  
  <!-- Taegeuk Blue (Bottom) -->
  <path d="M 35 100 A 65 65 0 0 0 165 100 A 32.5 32.5 0 0 0 100 100 A 32.5 32.5 0 0 1 35 100 Z" fill="#3182CE"/>
  
  <!-- Stylized Kicking Figure -->
  <g fill="#ffffff" stroke="#E2E8F0" stroke-width="1">
    <!-- Head -->
    <circle cx="65" cy="90" r="6" />
    <!-- Body/Legs -->
    <path d="M 65 100 Q 80 110 90 140 L 95 140 Q 85 105 100 90 Q 120 80 140 65 L 135 60 Q 110 75 90 85 Q 75 80 60 115 L 65 120 Q 75 95 85 95 Z" />
  </g>

  <!-- Korean Text '태권도' -->
  <text x="135" y="110" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">태</text>
  <text x="135" y="125" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">권</text>
  <text x="135" y="140" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">도</text>

  <!-- Circular Text Paths -->
  <path id="circlePathTop" d="M 20 100 A 80 80 0 0 1 180 100" fill="none"/>
  <path id="circlePathBottom" d="M 20 100 A 80 80 0 0 0 180 100" fill="none"/>
  
  <!-- Circular Text -->
  <text font-family="sans-serif" font-size="11" fill="#ffffff" font-weight="bold" letter-spacing="0.5">
    <textPath href="#circlePathTop" startOffset="50%" text-anchor="middle">ASSOCIAÇÃO COLOMBO DE TAEKWONDO</textPath>
  </text>
  <text font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" letter-spacing="2">
    <textPath href="#circlePathBottom" startOffset="50%" text-anchor="middle">콜롬보 태권도 협회</textPath>
  </text>

  <!-- Fist Icons -->
  <g transform="translate(15, 92) scale(0.7)" fill="#ffffff">
    <path d="M 10 0 C 15 0 20 5 20 10 L 20 20 C 20 25 15 30 10 30 C 5 30 0 25 0 20 L 0 10 C 0 5 5 0 10 0 Z" />
    <path d="M 20 5 L 25 5 C 28 5 30 7 30 10 L 30 20 C 30 23 28 25 25 25 L 20 25" />
  </g>
  
  <g transform="translate(170, 92) scale(0.7)" fill="#ffffff">
    <path d="M 10 0 C 15 0 20 5 20 10 L 20 20 C 20 25 15 30 10 30 C 5 30 0 25 0 20 L 0 10 C 0 5 5 0 10 0 Z" />
    <path d="M 0 5 L -5 5 C -8 5 -10 7 -10 10 L -10 20 C -10 23 -8 25 -5 25 L 0 25" />
  </g>
</svg>
