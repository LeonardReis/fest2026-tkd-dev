<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="95" fill="#2B82B8"/>
  
  <!-- Inner Circle (Taegeuk background) -->
  <circle cx="100" cy="100" r="70" fill="#fff"/>
  
  <!-- Taegeuk Red (Top) -->
  <path d="M 30 100 A 70 70 0 0 1 170 100 A 35 35 0 0 0 100 100 A 35 35 0 0 1 30 100 Z" fill="#D32F2F"/>
  
  <!-- Taegeuk Blue (Bottom) -->
  <path d="M 30 100 A 70 70 0 0 0 170 100 A 35 35 0 0 0 100 100 A 35 35 0 0 1 30 100 Z" fill="#1976D2"/>
  
  <!-- Text 'Lopes' -->
  <text x="100" y="115" font-family="'Brush Script MT', 'Comic Sans MS', cursive, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" transform="rotate(-10 100 100)" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3)">Lopes</text>
  
  <!-- Text '로페스' -->
  <text x="130" y="135" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">로페스</text>

  <!-- Circular Text Paths -->
  <path id="circlePathTop" d="M 15 100 A 85 85 0 0 1 185 100" fill="none"/>
  <path id="circlePathBottom" d="M 15 100 A 85 85 0 0 0 185 100" fill="none"/>
  
  <!-- Circular Text -->
  <text font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" letter-spacing="1">
    <textPath href="#circlePathBottom" startOffset="50%" text-anchor="middle">LOPES TAEKWONDO UNION BRAZIL</textPath>
  </text>
  <text font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="bold" letter-spacing="1.5">
    <textPath href="#circlePathTop" startOffset="50%" text-anchor="middle">로페스 태권도 연합 브라질, 국기원</textPath>
  </text>

  <!-- Fist Icons (Approximation using simple paths) -->
  <!-- Left Fist -->
  <g transform="translate(12, 92) scale(0.8)" fill="#ffffff">
    <path d="M 10 0 C 15 0 20 5 20 10 L 20 20 C 20 25 15 30 10 30 C 5 30 0 25 0 20 L 0 10 C 0 5 5 0 10 0 Z" />
    <path d="M 20 5 L 25 5 C 28 5 30 7 30 10 L 30 20 C 30 23 28 25 25 25 L 20 25" />
  </g>
  
  <!-- Right Fist -->
  <g transform="translate(172, 92) scale(0.8)" fill="#ffffff">
    <path d="M 10 0 C 15 0 20 5 20 10 L 20 20 C 20 25 15 30 10 30 C 5 30 0 25 0 20 L 0 10 C 0 5 5 0 10 0 Z" />
    <path d="M 0 5 L -5 5 C -8 5 -10 7 -10 10 L -10 20 C -10 23 -8 25 -5 25 L 0 25" />
  </g>
</svg>
